<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Validater Test Report - {{testRunId}}</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Inter, system-ui, -apple-system, sans-serif;
      color: #1f2937;
      background: #ffffff;
      line-height: 1.6;
      padding: 2rem;
      max-width: 1100px;
      margin: 0 auto;
    }

    /* Header */
    .report-header {
      border-bottom: 2px solid #e5e7eb;
      padding-bottom: 1.5rem;
      margin-bottom: 2rem;
    }

    .report-header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: #111827;
      margin-bottom: 0.5rem;
    }

    .report-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 1.5rem;
      font-size: 0.875rem;
      color: #6b7280;
    }

    .report-meta strong {
      color: #374151;
    }

    .report-url {
      color: #10b981;
      text-decoration: none;
      word-break: break-all;
    }

    .report-description {
      font-size: 0.9375rem;
      color: #4b5563;
      margin-top: 0.75rem;
    }

    .report-status {
      display: inline-block;
      padding: 0.125rem 0.625rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
    }

    .status-complete { background: #d1fae5; color: #065f46; }
    .status-failed { background: #fee2e2; color: #991b1b; }
    .status-other { background: #f3f4f6; color: #374151; }

    /* Summary Grid */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      border: 1px solid #e5e7eb;
      border-radius: 0.5rem;
      padding: 1rem;
      text-align: center;
    }

    .stat-card .stat-value {
      font-size: 2rem;
      font-weight: 700;
      line-height: 1.2;
    }

    .stat-card .stat-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #6b7280;
      margin-top: 0.25rem;
    }

    .stat-total .stat-value { color: #374151; }
    .stat-passed .stat-value { color: #10b981; }
    .stat-failed .stat-value { color: #ef4444; }
    .stat-rate .stat-value { color: #10b981; }

    /* Viewport Sections */
    .viewport-section {
      margin-bottom: 2.5rem;
      page-break-inside: avoid;
    }

    .viewport-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.75rem 1rem;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 0.5rem 0.5rem 0 0;
      margin-bottom: 0;
    }

    .viewport-header h2 {
      font-size: 1.125rem;
      font-weight: 600;
      color: #111827;
    }

    .viewport-meta {
      font-size: 0.8125rem;
      color: #6b7280;
    }

    /* Step Cards */
    .step-card {
      border: 1px solid #e5e7eb;
      border-top: none;
      padding: 1rem;
    }

    .step-card:last-child {
      border-radius: 0 0 0.5rem 0.5rem;
    }

    .step-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }

    .step-order {
      font-size: 0.8125rem;
      font-weight: 600;
      color: #374151;
    }

    .action-badge {
      display: inline-block;
      padding: 0.0625rem 0.5rem;
      border-radius: 0.375rem;
      font-size: 0.6875rem;
      font-weight: 600;
      text-transform: uppercase;
    }

    .action-click { background: #dbeafe; color: #1e40af; }
    .action-fill { background: #ede9fe; color: #5b21b6; }
    .action-assert { background: #fef3c7; color: #92400e; }
    .action-navigate { background: #d1fae5; color: #065f46; }
    .action-select { background: #e0e7ff; color: #3730a3; }
    .action-check { background: #ccfbf1; color: #134e4a; }
    .action-hover { background: #cffafe; color: #155e75; }
    .action-wait { background: #f3f4f6; color: #374151; }
    .action-default { background: #f3f4f6; color: #374151; }

    .status-badge {
      display: inline-block;
      padding: 0.0625rem 0.5rem;
      border-radius: 9999px;
      font-size: 0.6875rem;
      font-weight: 600;
    }

    .status-pass { background: #d1fae5; color: #065f46; }
    .status-fail { background: #fee2e2; color: #991b1b; }

    .step-duration {
      font-size: 0.75rem;
      color: #9ca3af;
    }

    .step-description {
      font-size: 0.8125rem;
      color: #6b7280;
      margin-bottom: 0.5rem;
    }

    /* Error Details */
    .error-block {
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 0.375rem;
      padding: 0.75rem;
      margin-bottom: 0.5rem;
    }

    .error-message {
      font-size: 0.8125rem;
      color: #dc2626;
      margin-bottom: 0.375rem;
    }

    .error-diff {
      font-family: 'Menlo', 'Consolas', monospace;
      font-size: 0.75rem;
      color: #7f1d1d;
    }

    .error-diff span {
      color: #9ca3af;
    }

    /* Screenshots */
    .step-screenshot {
      max-width: 480px;
      max-height: 300px;
      border: 1px solid #e5e7eb;
      border-radius: 0.375rem;
      object-fit: cover;
      margin-top: 0.25rem;
    }

    /* Footer */
    .report-footer {
      margin-top: 3rem;
      padding-top: 1rem;
      border-top: 1px solid #e5e7eb;
      font-size: 0.75rem;
      color: #9ca3af;
      text-align: center;
    }

    /* Print Styles */
    @media print {
      body {
        padding: 0.5rem;
        font-size: 0.875rem;
      }

      .viewport-section {
        page-break-before: always;
      }

      .viewport-section:first-of-type {
        page-break-before: auto;
      }

      .step-card {
        page-break-inside: avoid;
      }

      .step-screenshot {
        max-height: 200px;
      }

      .summary-grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="report-header">
    <h1>Validater Test Report</h1>
    <div class="report-meta">
      <span><strong>Run ID:</strong> {{testRunId}}</span>
      <span><strong>Status:</strong> <span class="report-status {{statusClass}}">{{status}}</span></span>
      <span><strong>Date:</strong> {{createdAt}}</span>
      {{completedAtBlock}}
    </div>
    <div style="margin-top: 0.5rem;">
      <a href="{{url}}" class="report-url" target="_blank">{{url}}</a>
    </div>
    <p class="report-description">{{testDescription}}</p>
  </div>

  <!-- Summary Stats -->
  <div class="summary-grid">
    <div class="stat-card stat-total">
      <div class="stat-value">{{totalSteps}}</div>
      <div class="stat-label">Total Steps</div>
    </div>
    <div class="stat-card stat-passed">
      <div class="stat-value">{{passedSteps}}</div>
      <div class="stat-label">Passed</div>
    </div>
    <div class="stat-card stat-failed">
      <div class="stat-value">{{failedSteps}}</div>
      <div class="stat-label">Failed</div>
    </div>
    <div class="stat-card stat-rate">
      <div class="stat-value">{{passRate}}%</div>
      <div class="stat-label">Pass Rate</div>
    </div>
  </div>

  <!-- Viewport Sections -->
  {{VIEWPORT_SECTIONS}}

  <!-- Footer -->
  <div class="report-footer">
    Generated by Validater &middot; {{generatedAt}}
  </div>
</body>
</html>
